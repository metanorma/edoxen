# yaml-language-server: $schema=http://json-schema.org/draft-07/schema
---
$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://github.com/metanorma/edoxen/schema/edoxen.yaml"
title: "Edoxen Resolution Set Schema"
description: "Schema for validating Edoxen resolution set YAML files"
type: object

properties:
  metadata:
    type: object
    description: "Metadata about the resolution set"
    properties:
      title:
        type: string
        description: "Title of the resolution set (language-neutral; for
          per-language titles, see Resolution.localizations)."
      identifier:
        type: string
        description: "Identifier for the resolution set (e.g., '2019-01')"
      dates:
        type: array
        description: "Array of dates related to the set"
        items:
          $ref: "#/$defs/ComplexDate"
      source:
        type: string
        description: "Source organization or secretariat"
      venue:
        type: string
        description: "Meeting venue"
      city:
        type: string
        description: "IATA city code (3-letter) of the host city, e.g. BER, CPT, PAR."
      country_code:
        type: string
        description: "ISO 3166-1 alpha-2 country code of the host country."
      source_urls:
        type: array
        description: "Canonical URLs to the source PDFs in each available language."
        items:
          type: object
          properties:
            ref:
              type: string
              description: "URL string."
            format:
              type: string
              description: "Document format, e.g. 'pdf', 'html'."
            lang:
              type: string
              description: "ISO 639-1 language code for this version (legacy)."
            language_code:
              type: string
              description: "ISO 639-3 three-letter language code for this version."
              pattern: "^[a-z]{3}$"
          required:
            - ref
          additionalProperties: false
      title_localized:
        type: array
        description: "Per-language title records (glossarist-style). Optional."
        items:
          $ref: "#/$defs/Localization"
      chair:
        type: string
        description: "Meeting chair"
      attendees:
        type: array
        items:
          type: string
        description: "List of attendees"
      apologies:
        type: array
        items:
          type: string
        description: "List of apologies"
      urls:
        type: array
        items:
          $ref: "#/$defs/Url"
        description: "Array of URLs related to the resolution set"

    additionalProperties: false

  resolutions:
    type: array
    description: "Array of resolutions"
    items:
      $ref: "#/$defs/Resolution"

required:
  - resolutions

$defs:
  Resolution:
    type: object
    description: "A single resolution. Language-agnostic admin fields live
      at this level; every translatable field is wrapped inside a
      `localizations[]` entry (one per available language)."
    properties:
      identifier:
        oneOf:
          - type: string
          - type: integer
        description: "Resolution identifier (e.g., '2019-01' or 1)"

      doi:
        type: string
        description: "Digital Object Identifier for this resolution."

      urn:
        type: string
        description: "Uniform Resource Name for this resolution."

      type:
        type: string
        enum:
          - "resolution"
          - "recommendation"
          - "decision"
          - "declaration"
        description: "Type of resolution"

      categories:
        type: array
        items:
          type: string
        description: "Resolution categories"

      dates:
        type: array
        items:
          $ref: "#/$defs/ComplexDate"
        description: "Array of relevant dates with start/end structure"

      agenda_item:
        type: string
        description: "Agenda item number this resolution corresponds to
          (e.g. '11.2', '16.3')."

      localizations:
        type: array
        description: "Per-language content for this resolution. At least
          one entry is required. Each entry declares its ISO 639-3
          language_code and ISO 15924 script."
        items:
          $ref: "#/$defs/Localization"
        minItems: 1

      urls:
        type: array
        items:
          $ref: "#/$defs/Url"
        description: "Array of URLs related to the resolution"

      meeting:
        $ref: "#/$defs/MeetingIdentifier"
        description: "Meeting information"

      relations:
        type: array
        items:
          $ref: "#/$defs/ResolutionRelations"
        description: "Relations to other resolutions"

    additionalProperties: false
    required:
      - identifier
      - localizations

  Localization:
    type: object
    description: "A monolingual rendering of a Resolution. Mirrors the
      glossarist LocalizedConcept pattern: language-agnostic fields
      live on the parent; per-language content lives here."
    properties:
      language_code:
        type: string
        description: "ISO 639-3 three-letter language code (e.g. 'eng',
          'fra', 'jpn', 'rus', 'ara')."
        pattern: "^[a-z]{3}$"
      script:
        type: string
        description: "ISO 15924 four-letter script code (e.g. 'Latn',
          'Cyrl', 'Hant', 'Arab')."
        pattern: "^[A-Z][a-z]{3}$"
      title:
        type: string
        description: "Localized resolution title."
      subject:
        type: string
        description: "Localized subject or scope."
      message:
        type: string
        description: "Localized resolution message."
      considering:
        type: string
        description: "Localized considering clause."
      considerations:
        type: array
        items:
          $ref: "#/$defs/Consideration"
        description: "Considerations in this language."
      actions:
        type: array
        items:
          $ref: "#/$defs/Action"
        description: "Actions in this language."
      approvals:
        type: array
        items:
          $ref: "#/$defs/Approval"
        description: "Approval information for this localization."
    required:
      - language_code
    additionalProperties: false

  ComplexDate:
    type: object
    description: "Date with start and end"
    properties:
      start:
        type: string
        format: date
        description: "Start date or single date if no end date"
      end:
        type: string
        format: date
        description: "End date (optional)"
      kind:
        type: string
        enum:
          - "enactment"
          - "ballot"
          - "effective"
          - "decision"
          - "meeting"
        description: "Kind of date (e.g., enactment, ballot, effective)"
    required:
    - kind
    additionalProperties: false

  Url:
    type: object
    description: "URL with kind and reference"
    properties:
      kind:
        type: string
        enum:
          - "access"
          - "report"
        description: "Kind of URL (e.g., access, report)"
      ref:
        type: string
        description: "Reference URL"
      format:
        type: string
        description: "Format of the URL (e.g., 'html', 'pdf')"
    additionalProperties: false

  Consideration:
    type: object
    description: "A consideration leading to a resolution"
    properties:
      type:
        type: string
        enum:
          - "acknowledging"
          - "following"
          - "basing"
          - "considering"
          - "identifying"
          - "according"
          - "noting"
          - "recalling"
          - "recognises"
          - "recognising"
          - "recognizing"
        description: "Type of consideration"

      dates:
        type: array
        items:
          $ref: "#/$defs/ComplexDate"

      message:
        type: string
        description: "Consideration text."

      subject:
        type: string
        description: "Subject of the consideration."

    required:
    - type
    - message
    additionalProperties: false

  Approval:
    type: object
    description: "Approval information for a resolution"
    properties:
      type:
        type: string
        enum:
          - "affirmative"
          - "negative"
        description: "Type of approval"

      degree:
        type: string
        enum:
          - "unanimous"
          - "majority"
          - "minority"
        description: "Degree of approval"

      message:
        type: string
        description: "Approval details"

    additionalProperties: false

  Action:
    type: object
    description: "An action taken in a resolution"
    required:
      - type
      - message
    properties:
      type:
        type: string
        enum:
          - "accepts"
          - "acknowledges"
          - "adoption"
          - "adopts"
          - "agrees"
          - "allocates"
          - "appoints"
          - "appreciates"
          - "appreciation"
          - "approves"
          - "asks"
          - "assigns"
          - "chairs"
          - "communicating"
          - "confirms"
          - "considers"
          - "consults"
          - "creates"
          - "decides"
          - "defines"
          - "delegates"
          - "delivering"
          - "directs"
          - "disbands"
          - "drafting"
          - "elects"
          - "empowers"
          - "encourages"
          - "endorses"
          - "estabilishes"
          - "establishes"
          - "gathering"
          - "identifies"
          - "instructs"
          - "investigates"
          - "nominates"
          - "notes"
          - "notifies"
          - "recognises"
          - "recognizes"
          - "reminds"
          - "recommends"
          - "registers"
          - "regrets"
          - "request"
          - "replaces"
          - "requests"
          - "resolves"
          - "restates"
          - "scopes"
          - "secures"
          - "sends"
          - "supports"
          - "thanks"
          - "welcomes"
          - "withdraws"
        description: "Type of action"

      dates:
        type: array
        items:
          $ref: "#/$defs/ComplexDate"
        description: "Dates of the action"

      message:
        type: string
        description: "Action text."

      subject:
        type: string
        description: "Subject of the action."

      degree:
        type: string
        description: "Degree of the action"
        enum:
          - "unanimous"
          - "majority"
          - "minority"

    additionalProperties: false

  MeetingIdentifier:
    type: object
    description: "Meeting identification information"
    properties:
      venue:
        type: string
        description: "Meeting venue"

      dates:
        type: array
        description: "Meeting dates"
        items:
          $ref: "#/$defs/ComplexDate"

      identifier:
        type: string
        description: "Meeting identifier"

    additionalProperties: false

  ResolutionRelations:
    type: object
    description: "Relation between resolutions"
    properties:
      type:
        type: string
        enum:
          - "supersedes"
          - "amends"
          - "references"
          - "replaces"
          - "updates"
        description: "Type of relation"

      target:
        type: string
        description: "Target resolution identifier"

      description:
        type: string
        description: "Description of the relation"

    additionalProperties: false

  StructuredIdentifier:
    type: object
    description: "Structured identifier with prefix and number"
    properties:
      prefix:
        type: string
        description: "Identifier prefix"

      number:
        oneOf:
          - type: string
          - type: integer
        description: "Identifier number"

    additionalProperties: false

  SubjectBody:
    type: object
    description: "Subject body information"
    properties:
      name:
        type: string
        description: "Name of the subject body"

      address:
        type: string
        description: "Address of the subject body"

    additionalProperties: false

additionalProperties: false
