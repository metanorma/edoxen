name: release

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: 'x.y.z, major, minor, patch. Use "skip" to publish the current version.'
        required: true
        default: 'patch'
  repository_dispatch:
    types: [ do-release ]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Configure RubyGems OIDC Trusted Publishing
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Release
        run: |
          gem install gem-release
          REQUESTED="${{ github.event.inputs.next_version }}"
          if [ "$REQUESTED" != "skip" ] && [ -n "$REQUESTED" ]; then
            gem bump --version "$REQUESTED"
          fi
          bundle exec rake release
